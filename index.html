<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ikura raider lol</title>
    <style>
        :root {
            --bg: #050508;
            --container-bg: #0d0d16;
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --text: #c0c0c0;
            --border: #1f1f33;
        }
        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', 'Consolas', monospace;
            background: var(--bg);
            background-image: linear-gradient(rgba(10, 10, 20, 0.8) 50%, rgba(0, 0, 0, 0) 50%),
                              linear-gradient(90deg, rgba(255, 0, 122, 0.05), rgba(0, 242, 255, 0.05));
            background-size: 100% 4px, 100% 100%;
            color: var(--text);
            display: flex; justify-content: center; min-height: 100vh;
        }
        .container {
            background: var(--container-bg);
            border: 2px solid var(--border);
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 10px var(--border);
            width: 100%; max-width: 900px;
            position: relative; overflow: hidden;
        }
        .container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
        }
        h2 {
            text-align: center; color: var(--neon-blue);
            text-transform: uppercase; letter-spacing: 8px;
            text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 30px;
        }
        label {
            display: block; margin-top: 15px; font-size: 0.75em;
            color: var(--neon-pink); text-transform: uppercase; letter-spacing: 2px;
        }
        textarea, input, select {
            width: 100%; padding: 12px;
            border: 1px solid var(--border);
            background: #000; color: #fff;
            border-radius: 3px; box-sizing: border-box; outline: none;
            transition: 0.2s; margin-top: 5px;
        }
        textarea:focus, input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .checkbox-group {
            display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0;
            padding: 15px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border);
        }
        .checkbox-group label { display: flex; align-items: center; cursor: pointer; color: #fff; font-size: 0.85em; }
        input[type="checkbox"] { width: auto; margin-right: 10px; accent-color: var(--neon-blue); }
        button {
            width: 100%; padding: 15px; border: none; cursor: pointer;
            font-weight: bold; transition: 0.3s; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .btn-check { background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); }
        .btn-check:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 20px var(--neon-pink); }
        .btn-start {
            background: var(--neon-blue); color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .btn-start:hover { background: #fff; box-shadow: 0 0 25px #fff; }
        .btn-stop { background: #222; color: #555; }
        #log {
            margin-top: 25px; height: 250px; overflow-y: auto;
            background: #000; padding: 15px; font-size: 0.7em;
            border: 1px solid var(--border); color: var(--neon-green);
            line-height: 1.6; font-family: 'Consolas', monospace;
        }
        .log-error { color: #ff0040; text-shadow: 0 0 5px #ff0040; }
        .log-success { color: var(--neon-green); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

<div class="container">
    <h2>ikura raider</h2>

    <label>Access Tokens</label>
    <textarea id="tokens" placeholder="Token per line..."></textarea>

    <div class="grid">
        <div>
            <label>Channel ID</label>
            <input type="text" id="channelId" placeholder="123456789...">
        </div>
        <div>
            <label>Delay (ms)</label>
            <input type="number" id="delay" value="1000">
        </div>
        <div>
            <label>Mentions</label>
            <input type="number" id="mentionCount" value="2">
        </div>
    </div>

    <div class="checkbox-group">
        <label><input type="checkbox" id="enableRandomString" checked> Random String</label>
        <label><input type="checkbox" id="enableRandomMention"> Random Mentions</label>
        <label><input type="checkbox" id="enableRandomReply"> Random Reply <span id="historyCount" style="color:var(--neon-pink)">(0)</span></label>
    </div>

    <label>Target User IDs (Optional)</label>
    <textarea id="userIds" placeholder="User ID1, ID2..."></textarea>
    <button class="btn-check" onclick="getUser()">Get UserIDs & reply log</button>

    <label>Messages (Comma separate)</label>
    <textarea id="messages" placeholder="Raid by ikura lol, raid by discord.gg/ctkp-aarr"></textarea>

    <div class="grid">
        <button class="btn-check" onclick="checkTokens()">Check Tokens</button>
        <select id="mode">
            <option value="1">Parallel Mode</option>
            <option value="2">Sequential Mode</option>
        </select>
    </div>

    <div class="grid" style="margin-top: 25px;">
        <button id="startBtn" class="btn-start" onclick="startRaiding()">Start</button>
        <button id="stopBtn" class="btn-stop" onclick="stopRaiding()" disabled>Stop</button>
    </div>

    <div id="log">ikura raider ready</div>
</div>

<script>
    let isRunning = false;
    let msgHistory = [];

    const logger = (m, type) => {
        const b = document.getElementById('log');
        const cls = type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '');
        b.innerHTML = `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${m}</div>` + b.innerHTML;
    };

    // Random String (Emoji)
    const getRandomEmoji = () => {
        const emojiRanges = [
            [0x1F600, 0x1F64F], // Emoticons
            [0x1F300, 0x1F5FF], // Misc Symbols and Pictographs
            [0x1F680, 0x1F6FF], // Transport and Map
            [0x1F900, 0x1F9FF], // Supplemental Symbols and Pictographs
            [0x2600, 0x26FF],   // Misc Symbols
            [0x2700, 0x27BF],    // Dingbats
            [0x25A0, 0x25FF],   // Geometric Shapes 
            [0x2190, 0x21FF],   // Arrows 
            [0x2000, 0x206F],   // General Punctuation 
            [0x2980, 0x29FF],   // Misc Mathematical Symbols-B 
            [0x2B00, 0x2BFF]    // Misc Symbols and Arrows
        ];
        const range = emojiRanges[Math.floor(Math.random() * emojiRanges.length)];
        const codePoint = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
        return String.fromCodePoint(codePoint);
    };

    // Random String
    const genRandomString = () => {
        const langChars = "ذرزسشصضطظعغفقكلمنهويابتثجحخدあいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ的一是在不了有和人这中大来上个国我到说们為子和對也得而自着下於後小機動生時會以多發能新樣家部分出道行成前所那最和與本理學裡實學物本主用裡樣和說現政正各見問力之進義本題間其經法當起關三定意從性由制已美個表些果明也通力加點去使什利都體五比公此外而長問二位之見其體民社系अ आ इ ई उ ऊ ऋ ए ऐ ओ औ क ख ग घ ङ च छ ज झ ञก ข ค ง จ ฉ ช ซ ญ ฎ ฏ ฐ ฑ ฒ ณ ด ต ถ ท ธ น บ ป ผ ฝ พ ฟ ภ ม ย ร ล ว ศ ษ ส ห ฬ อ ฮА Б В Г Д Е Ё Ж З И Й К Л М Н О П Р С Т У Ф Х Ц Ч Ш Щ Ъ Ы Ь Э Ю ЯΑ Β Γ Δ Ε Ζ Η Θ Ι Κ Λ Μ Ν Ξ Ο Π Ρ Σ Τ Υ Φ Χ Ψ Ωሀ ለ ሐ መ ሠ ረ ሰ ሸ ቀ በ ተ ቸ ኀ ነ ኘ አ ከ ወ ዐ ዘ ዠ የ ደ ጀ ገ ጠ ጨ ጰ ጸ ፀ ፈ ፐԱ Բ Գ Դ Ե Զ Է Ը Թ Ժ Ի Լ Խ Ծ Կ Հ Ձ Ղ Ճ Մ Յ Ն Շ Ո Չ Պ Ջ Ռ Ս Վ Տ Ր Ց Ւ Փ Ք Օ Ֆא ב ג ד ה ו ז ח ט י כ ל מ נ ס ע פ צ ק ר ש ת".split('');
        let s = "";
        for(let i=0; i<30; i++) {
            if(Math.random() > 0.19) {
                s += langChars[Math.floor(Math.random() * langChars.length)];
            } else {
                s += getRandomEmoji();
            }
        }
        return s;
    };

    async function getUser() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        const cid = document.getElementById('channelId').value.trim();
        if(!tks[0] || !cid) return alert("Configuration Missing.");
        
        logger("Fetching data...", "success");
        msgHistory = [];
        let uids = new Set();
        try {
            const r = await fetch(`https://discord.com/api/v9/channels/${cid}/messages?limit=100`, { 
                headers: { 'Authorization': tks[0].trim() } 
            });
            if (!r.ok) throw new Error();
            const data = await r.json();
            data.forEach(m => {
                msgHistory.push(m.id);
                uids.add(m.author.id);
            });
            document.getElementById('userIds').value = Array.from(uids).join(', ');
            document.getElementById('historyCount').innerText = `(${msgHistory.length})`;
            logger(`SYNC COMPLETE: ${msgHistory.length} MSGS / ${uids.size} USERS`, "success");
        } catch(e) { logger("Fetch Failed: Check Token/Permissions", "error"); }
    }

    function startRaiding() {
        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        logger("Starting Raid...", "success");
        runLoop();
    }

    function stopRaiding() {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        logger("Raid Stopped.", "error");
    }

    async function runLoop() {
        while (isRunning) {
            const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
            const cid = document.getElementById('channelId').value.trim();
            const dly = parseInt(document.getElementById('delay').value) || 1000;
            const msgInput = document.getElementById('messages').value;
            
            const msgsArray = msgInput.split(',').map(m => m.trim()).filter(m => m !== "");
            
            const tasks = tks.map(async (t) => {
                if(!isRunning) return;

                let baseMsg = msgsArray.length > 0 
                    ? msgsArray[Math.floor(Math.random() * msgsArray.length)] 
                    : "ikura raider";

                let content = baseMsg;
                if (document.getElementById('enableRandomString').checked) {
                    content += `\n${genRandomString()}`;
                }
                
                if (document.getElementById('enableRandomMention').checked) {
                    const uids = document.getElementById('userIds').value.split(',').map(u => u.trim()).filter(u => u);
                    if(uids.length > 0) {
                        content += "\n";
                        for(let i=0; i<parseInt(document.getElementById('mentionCount').value); i++)
                            content += `<@${uids[Math.floor(Math.random() * uids.length)]}> `;
                    }
                }

                let body = { content: content };
                if (document.getElementById('enableRandomReply').checked && msgHistory.length > 0) {
                    body.message_reference = { channel_id: cid, message_id: msgHistory[Math.floor(Math.random() * msgHistory.length)] };
                }

                const shortToken = t.substring(0, 15) + "...";
                try {
                    const res = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, {
                        method: 'POST',
                        headers: { 'Authorization': t.trim(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if(res.ok) {
                        logger(`${shortToken} | ${cid} | ${content.substring(0,30).replace(/\n/g," ")}`, "success");
                    } else {
                        const err = await res.json();
                        logger(`ERROR: ${shortToken} | ${res.status} | ${err.message}`, "error");
                    }
                } catch (e) {
                    logger(`FATAL: Connection lost for ${shortToken}`, "error");
                }
            });

            if(document.getElementById('mode').value === "1") {
                await Promise.all(tasks);
                await new Promise(r => setTimeout(r, dly));
            } else {
                for(let task of tasks) { 
                    if(!isRunning) break;
                    await task; 
                    await new Promise(r => setTimeout(r, dly / tks.length)); 
                }
            }
        }
    }

    async function checkTokens() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        for (const t of tks) {
            try {
                const r = await fetch('https://discord.com/api/v9/users/@me', { headers: { 'Authorization': t.trim() } });
                logger(r.ok ? `VALID: ${t.substring(0,15)}...` : `INVALID: ${t.substring(0,15)}...`, r.ok ? "success" : "error");
            } catch(e) { logger("Check Erorr", "error"); }
        }
    }
</script>
</body>
</html>
